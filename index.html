<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>
</head>
<body>
<script>
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    window.location.href = 'https://dorkinator42.github.io/call-portal/login.html' + hash;
  } else {
    window.location.href = 'https://dorkinator42.github.io/call-portal/login.html';
  }
</script>
</body>
</html>
